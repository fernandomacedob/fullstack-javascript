<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulating attributes with Javascript</title>
    <script src="./index.js" defer></script>
</head>
<body>
    <h1>Manipulating attributes with Javascript</h1>
    <hr>

    <input type="text" name="input" id="input" data-something="Any value">
    <button id="value">Change Value</button>
    <button id="type">Change Type</button>
    <button id="placeholder">Change Placeholder</button>
    <button id="disable">Disable/Enable</button>
    <button id="changeData">Change Data</button>

    
</body>
</html>
